name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["18", "20", "22"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Verify imports
        run: node -e "const { RoutePlex, RoutePlexError } = require('.'); console.log('OK')"

      - name: Verify types
        run: npx -y typescript --noEmit index.d.ts 2>/dev/null || echo "Types check skipped (no tsconfig)"

      - name: Dry-run pack
        run: npm pack --dry-run
